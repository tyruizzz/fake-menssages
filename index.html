<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora Graiman</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;min-height:100vh}
header{background:#2C2C2A;border-bottom:3px solid #FAC775}
.hi{max-width:980px;margin:0 auto;padding:14px 20px;display:flex;align-items:center;gap:12px}
.hl{width:40px;height:40px;background:#FAC775;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
header h1{color:#fff;font-size:16px;font-weight:700}
header p{color:#D3D1C7;font-size:11px;margin-top:1px}
.tabs{max-width:980px;margin:0 auto;padding:16px 20px 0;display:flex;gap:4px}
.tab{padding:8px 16px;border-radius:8px 8px 0 0;font-size:12px;font-weight:700;cursor:pointer;border:none;background:#ddd;color:#666;transition:all .2s}
.tab.active{background:#fff;color:#2C2C2A}
.container{max-width:980px;margin:0 auto;padding:0 20px 30px}
.page{display:none;background:#fff;border-radius:0 8px 8px 8px;padding:20px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.page.active{display:block}
.card{background:#f8f8f8;border-radius:10px;padding:16px;margin-bottom:14px;border:1px solid #eee}
.ct{font-size:11px;font-weight:700;color:#2C2C2A;letter-spacing:.06em;text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #FAC775}
.row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px}
.field{flex:1;min-width:110px}
label{display:block;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
input,select{width:100%;padding:8px 10px;border:2px solid #e0e0e0;border-radius:7px;font-size:13px;font-family:Arial,sans-serif;outline:none;background:#fff;transition:border-color .2s}
input:focus,select:focus{border-color:#FAC775}
input[readonly]{background:#f0f0f0}
.btn{padding:8px 16px;background:#2C2C2A;color:#FAC775;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:background .2s;align-self:flex-end}
.btn:hover{background:#444}
.btn.sec{background:#f0f2f5;color:#2C2C2A;border:2px solid #ddd}
.btn.sec:hover{background:#e0e0e0}
.btn.grn{background:#375623;color:#fff}
.btn.grn:hover{background:#4a7030}
.btn.red{background:#c00;color:#fff}
.btn.red:hover{background:#a00}
.btn.sml{padding:4px 10px;font-size:11px}
.specs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.spec{background:#fff;border-radius:8px;padding:10px;text-align:center;border:1px solid #e8e8e8}
.spec.hl{background:#2C2C2A;border-color:#2C2C2A}
.spec .v{font-size:19px;font-weight:700;color:#2C2C2A}
.spec.hl .v{color:#FAC775}
.spec .l{font-size:10px;color:#888;text-transform:uppercase;margin-top:2px}
.spec.hl .l{color:#D3D1C7}
.prod-box{display:none;background:#F7F5EE;border-radius:10px;padding:12px 16px;margin-top:12px;border-left:4px solid #FAC775}
.prod-name{font-size:14px;font-weight:700;color:#2C2C2A}
.prod-meta{font-size:11px;color:#888;margin-top:2px}
.prod-nota{font-size:11px;color:#856404;background:#FFF3CD;padding:3px 8px;border-radius:4px;margin-top:5px;display:inline-block}
.var-box{display:none;background:#FFF8E7;border:2px solid #FAC775;border-radius:9px;padding:10px 14px;margin-top:10px}
.plt-box{display:none;background:#E8F4FD;border:2px solid #17a2b8;border-radius:9px;padding:10px 14px;margin-top:10px}
.no-result{color:#e53935;font-size:13px;margin-top:8px;display:none}
.alert{padding:9px 12px;border-radius:7px;font-size:12px;margin-top:10px;display:none}
.alert.info{background:#d1ecf1;color:#0c5460;border-left:4px solid #17a2b8}
.alert.ok{background:#d4edda;color:#155724;border-left:4px solid #28a745}
.alert.err{background:#f8d7da;color:#721c24;border-left:4px solid #dc3545}
.tag{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:700}
.tag.red{background:#f8d7da;color:#721c24}
.tag.cloud{background:#cce5ff;color:#004085}
table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
th{background:#2C2C2A;color:#FAC775;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
td{padding:6px 8px;border-bottom:1px solid #f0f0f0;vertical-align:middle}
tr:hover td{background:#fafafa}
tr.total td{font-weight:700;background:#F7F5EE!important;border-top:2px solid #FAC775}
.loading{text-align:center;padding:24px;color:#888;font-size:13px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:500px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #FAC775}
.modal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:12px;border-top:1px solid #eee}
.seed-bar{background:#FFF3CD;border:1px solid #FAC775;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#856404;display:flex;align-items:center;gap:10px}
@media(max-width:600px){.specs{grid-template-columns:repeat(2,1fr)}.row{flex-direction:column}}
</style>
</head>
<body>
<header>
  <div class="hi">
    <div class="hl">📐</div>
    <div><h1>Calculadora Graiman</h1><p>Auditoría de Inventario — Mobiltroicorp</p></div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('buscar',this)">🔍 Buscar</button>
  <button class="tab" onclick="showTab('reglas',this)">📋 Reglas de Pallet</button>
  <button class="tab" onclick="showTab('nueva',this)">➕ Agregar</button>
</div>

<div class="container">

<!-- BUSCAR -->
<div id="tab-buscar" class="page active">
  <div class="card">
    <div class="ct">Buscar Producto</div>
    <div class="row">
      <div class="field">
        <label>Código (8 dígitos)</label>
        <input type="text" id="inputCod" placeholder="ej. 00002357" maxlength="8"
               oninput="this.value=this.value.replace(/\D/g,'')"
               onkeydown="if(event.key==='Enter')buscar()">
      </div>
      <div class="field">
        <label>O buscar por nombre</label>
        <input type="text" id="inputNombre" placeholder="ej. GENOVA 60X60"
               onkeydown="if(event.key==='Enter')buscar()">
      </div>
      <button class="btn" onclick="buscar()">BUSCAR</button>
    </div>
    <div class="var-box" id="variantBox">
      <label>⚠️ Variantes disponibles — selecciona cuál aplica:</label>
      <select id="variantSelect" onchange="aplicarVariante()" style="margin-top:6px"></select>
    </div>
    <div class="plt-box" id="palletBox">
      <label>📦 Pallet variable — selecciona el tamaño:</label>
      <select id="palletSelect" onchange="aplicarPallet()" style="margin-top:6px"></select>
    </div>
    <div class="no-result" id="noResult">⚠️ Producto no encontrado.</div>
    <div class="prod-box" id="productInfo">
      <div class="prod-name" id="prodNombre"></div>
      <div class="prod-meta" id="prodMeta"></div>
      <div id="prodNota"></div>
      <div class="specs" id="specsGrid"></div>
    </div>
  </div>
  <div class="card" id="calcCard" style="display:none">
    <div class="ct">🧮 Calcular Conteo Físico</div>
    <div class="row">
      <div class="field"><label>Pallets completos</label><input type="number" id="inPallets" min="0" value="0" oninput="calcular()"></div>
      <div class="field"><label>Cajas sueltas</label><input type="number" id="inCajas" min="0" value="0" oninput="calcular()"></div>
      <div class="field"><label>Piezas sueltas</label><input type="number" id="inPiezas" min="0" value="0" oninput="calcular()"></div>
      <button class="btn sec" onclick="limpiar()">Limpiar</button>
    </div>
    <table>
      <thead><tr><th>Concepto</th><th>Pallets</th><th>Cajas</th><th>M²</th><th>Piezas</th></tr></thead>
      <tbody id="summaryBody"></tbody>
    </table>
    <div class="alert info" id="alertInfo"></div>
  </div>
</div>

<!-- REGLAS -->
<div id="tab-reglas" class="page">
  <div class="seed-bar" id="seedBar" style="display:none">
    ⚠️ No hay reglas en Supabase todavía.
    <button class="btn grn sml" onclick="seedRules()">📤 Cargar todas las reglas iniciales</button>
  </div>
  <div class="card">
    <div class="ct">Todas las Reglas de Pallet</div>
    <div class="row" style="margin-bottom:12px">
      <div class="field"><input type="text" id="filtroReglas" placeholder="Filtrar por código, nombre o nota..." oninput="filtrarReglas()"></div>
      <button class="btn sec" onclick="cargarReglas()">🔄 Recargar</button>
    </div>
    <div id="tablaReglas"><div class="loading">⏳ Cargando...</div></div>
  </div>
</div>

<!-- NUEVA REGLA -->
<div id="tab-nueva" class="page">
  <div class="card">
    <div class="ct">➕ Agregar o Actualizar Regla</div>
    <div class="row">
      <div class="field">
        <label>Código producto (opcional)</label>
        <input type="text" id="nCodigo" placeholder="ej. 00001234" maxlength="8"
               oninput="this.value=this.value.replace(/\D/g,'');autoFill()">
      </div>
      <div class="field">
        <label>Nombre / descripción</label>
        <input type="text" id="nNombre" placeholder="ej. GENOVA 60X60 RCE">
      </div>
    </div>
    <div class="row">
      <div class="field"><label>M² por caja</label><input type="number" id="nM2c" placeholder="ej. 2.09" step="0.01" oninput="calcNuevoPallet()"></div>
      <div class="field"><label>Cajas por pallet</label><input type="number" id="nCj" placeholder="ej. 36" oninput="calcNuevoPallet()"></div>
      <div class="field"><label>M² por pallet (auto)</label><input type="text" id="nM2p" placeholder="se calcula solo" readonly></div>
    </div>
    <div class="row">
      <div class="field"><label>Nota / tipo</label><input type="text" id="nNota" placeholder="ej. 60x60 RCE Graiman"></div>
      <button class="btn grn" onclick="guardarRegla()">💾 GUARDAR</button>
    </div>
    <div class="alert ok" id="alertOk"></div>
    <div class="alert err" id="alertErr"></div>
  </div>
</div>

</div>

<!-- MODAL EDITAR -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3>✏️ Editar Regla</h3>
    <input type="hidden" id="eId">
    <div class="modal-row">
      <div><label>Código</label><input type="text" id="eCodigo" maxlength="8"></div>
      <div><label>Nombre</label><input type="text" id="eNombre"></div>
    </div>
    <div class="modal-row">
      <div><label>M² por caja</label><input type="number" id="eM2c" step="0.01" oninput="calcEditPallet()"></div>
      <div><label>Cajas por pallet</label><input type="number" id="eCj" oninput="calcEditPallet()"></div>
    </div>
    <div class="modal-row">
      <div><label>M² por pallet (auto)</label><input type="text" id="eM2p" readonly></div>
      <div><label>Nota</label><input type="text" id="eNota"></div>
    </div>
    <div class="modal-footer">
      <button class="btn sec" onclick="cerrarModal()">Cancelar</button>
      <button class="btn grn" onclick="guardarEdicion()">💾 Guardar cambios</button>
    </div>
  </div>
</div>

let allRules = [];
let currentPallet = null, currentProducto = null;

// ── Supabase API ──
const SBH = {'apikey':SB_KEY,'Authorization':`Bearer ${SB_KEY}`,'Content-Type':'application/json'};
async function sbGet(){
  const r = await fetch(`${SB_URL}/rest/v1/${TABLA}?order=codigo.asc,nombre.asc`,{headers:SBH});
  return r.ok ? r.json() : [];
}
async function sbInsert(data){
  return fetch(`${SB_URL}/rest/v1/${TABLA}`,{method:'POST',headers:{...SBH,'Prefer':'return=representation'},body:JSON.stringify(data)});
}
async function sbUpdate(id,data){
  return fetch(`${SB_URL}/rest/v1/${TABLA}?id=eq.${id}`,{method:'PATCH',headers:SBH,body:JSON.stringify(data)});
}
async function sbDelete(id){
  return fetch(`${SB_URL}/rest/v1/${TABLA}?id=eq.${id}`,{method:'DELETE',headers:SBH});
}

// ── Seed initial rules ──
async function seedRules(){
  if(!confirm(`¿Cargar las ${SEED_RULES.length} reglas iniciales a Supabase?`)) return;
  document.getElementById('seedBar').innerHTML='⏳ Cargando reglas...';
  let ok=0,err=0;
  for(const r of SEED_RULES){
    const res = await sbInsert(r);
    res.ok ? ok++ : err++;
  }
  document.getElementById('seedBar').innerHTML=`✅ ${ok} reglas cargadas${err?` (${err} errores/duplicados)`:''}`;
  setTimeout(()=>document.getElementById('seedBar').style.display='none',3000);
  await cargarReglas();
}

// ── Cargar reglas ──
async function cargarReglas(){
  document.getElementById('tablaReglas').innerHTML='<div class="loading">⏳ Cargando desde Supabase...</div>';
  try{
    allRules = await sbGet();
    if(allRules.length===0){
      document.getElementById('seedBar').style.display='flex';
      document.getElementById('tablaReglas').innerHTML='<div class="loading">No hay reglas. Usa el botón de arriba para cargar las reglas iniciales.</div>';
    } else {
      document.getElementById('seedBar').style.display='none';
      renderReglas(allRules);
    }
  } catch(e){
    document.getElementById('tablaReglas').innerHTML='<div class="loading" style="color:#c00">❌ Error conectando a Supabase</div>';
  }
}

function filtrarReglas(){
  const q = document.getElementById('filtroReglas').value.toUpperCase();
  const f = allRules.filter(r=>
    (r.codigo||'').includes(q)||
    (r.nombre||'').toUpperCase().includes(q)||
    (r.nota||'').toUpperCase().includes(q)
  );
  renderReglas(f);
}

function renderReglas(data){
  if(!data.length){document.getElementById('tablaReglas').innerHTML='<div class="loading">Sin resultados.</div>';return;}
  let html=`<div style="font-size:11px;color:#888;margin-bottom:6px">${data.length} reglas</div>
  <table><thead><tr>
    <th>Código</th><th>Nombre</th><th>M²/Caja</th><th>Cajas/Plt</th><th>M²/Plt</th><th>Nota</th><th>Acciones</th>
  </tr></thead><tbody>`;
  for(const r of data){
    html+=`<tr>
      <td><code>${r.codigo||'—'}</code></td>
      <td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.nombre||'—'}</td>
      <td><b>${r.m2_caja}</b></td>
      <td><b>${r.cajas_pallet}</b></td>
      <td><b>${r.m2_pallet}</b></td>
      <td style="color:#666;font-size:11px">${r.nota||''}</td>
      <td style="white-space:nowrap">
        <button class="btn sml" onclick="abrirModal(${r.id})">✏️ Editar</button>
        <button class="btn red sml" onclick="eliminar(${r.id})">🗑️</button>
      </td>
    </tr>`;
  }
  html+='</tbody></table>';
  document.getElementById('tablaReglas').innerHTML=html;
}

// ── Modal editar ──
function abrirModal(id){
  const r = allRules.find(x=>x.id===id);
  if(!r) return;
  document.getElementById('eId').value=r.id;
  document.getElementById('eCodigo').value=r.codigo||'';
  document.getElementById('eNombre').value=r.nombre||'';
  document.getElementById('eM2c').value=r.m2_caja;
  document.getElementById('eCj').value=r.cajas_pallet;
  document.getElementById('eM2p').value=r.m2_pallet;
  document.getElementById('eNota').value=r.nota||'';
  document.getElementById('modalBg').classList.add('open');
}
function cerrarModal(){document.getElementById('modalBg').classList.remove('open');}
function calcEditPallet(){
  const m2c=parseFloat(document.getElementById('eM2c').value)||0;
  const cj=parseFloat(document.getElementById('eCj').value)||0;
  document.getElementById('eM2p').value=m2c&&cj?(m2c*cj).toFixed(2):'';
}
async function guardarEdicion(){
  const id=parseInt(document.getElementById('eId').value);
  const cod=document.getElementById('eCodigo').value.trim();
  const data={
    codigo:cod?cod.padStart(8,'0'):null,
    nombre:document.getElementById('eNombre').value.trim(),
    m2_caja:parseFloat(document.getElementById('eM2c').value),
    cajas_pallet:parseInt(document.getElementById('eCj').value),
    m2_pallet:parseFloat(document.getElementById('eM2p').value),
    nota:document.getElementById('eNota').value.trim()
  };
  const r=await sbUpdate(id,data);
  if(r.ok){cerrarModal();await cargarReglas();}
  else alert('Error al guardar');
}

async function eliminar(id){
  const r=allRules.find(x=>x.id===id);
  if(!confirm(`¿Eliminar "${r?.nombre||id}"?`)) return;
  await sbDelete(id);
  await cargarReglas();
}

// ── Nueva regla ──
function autoFill(){
  const cod=document.getElementById('nCodigo').value.padStart(8,'0');
  if(PRODUCTOS[cod]) document.getElementById('nNombre').value=PRODUCTOS[cod].nombre;
}
function calcNuevoPallet(){
  const m2c=parseFloat(document.getElementById('nM2c').value)||0;
  const cj=parseFloat(document.getElementById('nCj').value)||0;
  document.getElementById('nM2p').value=m2c&&cj?(m2c*cj).toFixed(2):'';
}
async function guardarRegla(){
  const cod=document.getElementById('nCodigo').value.trim();
  const nombre=document.getElementById('nNombre').value.trim();
  const m2c=parseFloat(document.getElementById('nM2c').value);
  const cj=parseInt(document.getElementById('nCj').value);
  const m2p=parseFloat(document.getElementById('nM2p').value)||m2c*cj;
  const nota=document.getElementById('nNota').value.trim();
  if(!nombre||isNaN(m2c)||isNaN(cj)){showAlert('alertErr','⚠️ Completa nombre, M²/caja y cajas');return;}
  const data={codigo:cod?cod.padStart(8,'0'):null,nombre,m2_caja:m2c,cajas_pallet:cj,m2_pallet:parseFloat(m2p.toFixed(2)),nota};
  const r=await sbInsert(data);
  if(r.ok){
    showAlert('alertOk','✅ Guardado correctamente');
    ['nCodigo','nNombre','nM2c','nCj','nM2p','nNota'].forEach(id=>document.getElementById(id).value='');
    await cargarReglas();
  } else {
    const e=await r.json();
    showAlert('alertErr','❌ '+(e.message||e.details||'Error'));
  }
}

function showAlert(id,msg){
  const el=document.getElementById(id);
  el.textContent=msg;el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

// ── Buscar ──
function getRuleForCode(cod){
  return allRules.find(r=>r.codigo&&r.codigo.padStart(8,'0')===cod);
}
function getRulesByName(nombre){
  const n=nombre.toUpperCase();
  return allRules.filter(r=>r.nombre&&r.nombre.toUpperCase().includes(n));
}
function getPiezaM2(nombre){
  const m=nombre.toUpperCase().match(/(\d+\.?\d*)X(\d+\.?\d*)/);
  return m?(parseFloat(m[1])/100)*(parseFloat(m[2])/100):null;
}
function fmt(n,d=2){return Number(n).toFixed(d)}

function buscar(){
  const cod=document.getElementById('inputCod').value.trim().padStart(8,'0');
  const nom=document.getElementById('inputNombre').value.trim().toUpperCase();
  let found=null,foundCod=null;
  if(cod.replace(/^0+/,'')!==''){if(PRODUCTOS[cod]){found=PRODUCTOS[cod];foundCod=cod;}}
  if(!found&&nom.length>2){
    for(const[k,v] of Object.entries(PRODUCTOS)){
      if(v.nombre.toUpperCase().includes(nom)){found=v;foundCod=k;break;}
    }
  }
  ['noResult','productInfo','variantBox','palletBox','calcCard'].forEach(id=>document.getElementById(id).style.display='none');
  currentPallet=null;
  if(!found){document.getElementById('noResult').style.display='block';return;}
  currentProducto={...found,codigo:foundCod};

  // 1. Buscar por código exacto en Supabase
  const byCode = foundCod ? getRuleForCode(foundCod) : null;
  if(byCode){
    currentPallet={m2c:byCode.m2_caja,cj:byCode.cajas_pallet,m2p:byCode.m2_pallet,nota:byCode.nota+' ☁️'};
    mostrarProducto();return;
  }

  // 2. Buscar por nombre en Supabase (puede haber varios)
  const byName = getRulesByName(found.nombre);
  if(byName.length===1){
    const r=byName[0];
    currentPallet={m2c:r.m2_caja,cj:r.cajas_pallet,m2p:r.m2_pallet,nota:r.nota+' ☁️'};
    mostrarProducto();return;
  }
  if(byName.length>1){
    // Multiple matches — show selector
    const sel=document.getElementById('variantSelect');
    sel.innerHTML=byName.map((r,i)=>`<option value="${i}">${r.nota} — ${r.m2_pallet} m² / ${r.cajas_pallet} cj</option>`).join('');
    sel.dataset.source='supabase';
    sel.dataset.rules=JSON.stringify(byName);
    document.getElementById('variantBox').style.display='block';
    const r=byName[0];
    currentPallet={m2c:r.m2_caja,cj:r.cajas_pallet,m2p:r.m2_pallet,nota:r.nota+' ☁️'};
    mostrarProducto();return;
  }

  // 3. No found in Supabase → show message
  document.getElementById('prodNota') && (document.getElementById('prodNota').innerHTML='');
  currentPallet=null;
  mostrarProducto();
}

function aplicarVariante(){
  const sel=document.getElementById('variantSelect');
  const idx=parseInt(sel.value);
  if(sel.dataset.source==='supabase'){
    const rules=JSON.parse(sel.dataset.rules);
    const r=rules[idx];
    currentPallet={m2c:r.m2_caja,cj:r.cajas_pallet,m2p:r.m2_pallet,nota:r.nota+' ☁️'};
  }
  mostrarProducto();limpiar();
}
function aplicarPallet(){}

function mostrarProducto(){
  const found=currentProducto,p=currentPallet;
  const piezaM2=getPiezaM2(found.nombre);
  document.getElementById('prodNombre').textContent=found.nombre;
  document.getElementById('prodMeta').textContent=`Código: ${found.codigo}  •  Clase: ${found.clase}  •  SubClase: ${found.subclase}`;
  let specsHTML='';
  if(p){
    const pzC=piezaM2?Math.round(p.m2c/piezaM2):'—';
    const pzP=piezaM2?Math.round(p.m2p/piezaM2):'—';
    document.getElementById('prodNota').innerHTML=`<span class="prod-nota">📋 ${p.nota}</span>`;
    specsHTML=`
      <div class="spec hl"><div class="v">${p.m2p}</div><div class="l">M² por Pallet</div></div>
      <div class="spec hl"><div class="v">${p.cj}</div><div class="l">Cajas por Pallet</div></div>
      <div class="spec"><div class="v">${p.m2c}</div><div class="l">M² por Caja</div></div>
      <div class="spec"><div class="v">${piezaM2?fmt(piezaM2,4):'—'}</div><div class="l">M² por Pieza</div></div>
      <div class="spec"><div class="v">${pzC}</div><div class="l">Piezas por Caja</div></div>
      <div class="spec"><div class="v">${pzP}</div><div class="l">Piezas por Pallet</div></div>`;
    document.getElementById('calcCard').style.display='block';
  } else {
    document.getElementById('prodNota').innerHTML='';
    specsHTML=`<div class="spec" style="grid-column:1/-1;padding:14px;text-align:left">
      <span class="tag red">Sin regla de pallet — agrega una en la pestaña ➕</span>
      <p style="margin-top:8px;font-size:12px;color:#666">Este producto no tiene medidas registradas todavía.</p>
    </div>`;
  }
  document.getElementById('specsGrid').innerHTML=specsHTML;
  document.getElementById('productInfo').style.display='block';
}

function calcular(){
  if(!currentPallet||!currentProducto) return;
  const p=currentPallet,piezaM2=getPiezaM2(currentProducto.nombre);
  const pzC=piezaM2?Math.round(p.m2c/piezaM2):null;
  const pa=parseFloat(document.getElementById('inPallets').value)||0;
  const ca=parseFloat(document.getElementById('inCajas').value)||0;
  const pz=parseFloat(document.getElementById('inPiezas').value)||0;
  const m2pa=pa*p.m2p,m2ca=ca*p.m2c,m2pz=pz*(piezaM2||0),totM2=m2pa+m2ca+m2pz;
  const totCj=(pa*p.cj)+ca+(pzC?pz/pzC:0),totPlt=totM2/p.m2p;
  const totPz=(pzC?(pa*p.cj*pzC)+(ca*pzC):0)+pz;
  const rows=[
    pa>0?`<tr><td>${pa} pallets</td><td>${fmt(pa,0)}</td><td>${fmt(pa*p.cj,0)}</td><td>${fmt(m2pa)}</td><td>${pzC?fmt(pa*p.cj*pzC,0):'—'}</td></tr>`:'',
    ca>0?`<tr><td>${ca} cajas sueltas</td><td>${fmt(m2ca/p.m2p,2)}</td><td>${fmt(ca,0)}</td><td>${fmt(m2ca)}</td><td>${pzC?fmt(ca*pzC,0):'—'}</td></tr>`:'',
    pz>0?`<tr><td>${pz} piezas sueltas</td><td>—</td><td>${pzC?fmt(pz/pzC,1):'—'}</td><td>${fmt(m2pz)}</td><td>${fmt(pz,0)}</td></tr>`:'',
    `<tr class="total"><td>TOTAL</td><td>${fmt(totPlt,2)} plt</td><td>${fmt(totCj,1)} cj</td><td>${fmt(totM2)} m²</td><td>${pzC?Math.round(totPz)+' pz':'—'}</td></tr>`
  ].join('');
  document.getElementById('summaryBody').innerHTML=rows;
  const info=document.getElementById('alertInfo');
  if(totM2>0){info.style.display='block';info.innerHTML=`<strong>Resumen:</strong> ${fmt(totPlt,2)} pallets · ${fmt(totCj,1)} cajas · ${fmt(totM2)} m²${pzC?' · '+Math.round(totPz)+' piezas':''}`}
  else info.style.display='none';
}
function limpiar(){
  ['inPallets','inCajas','inPiezas'].forEach(id=>document.getElementById(id).value=0);
  document.getElementById('summaryBody').innerHTML='';
  document.getElementById('alertInfo').style.display='none';
}

function showTab(name,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  el.classList.add('active');
  if(name==='reglas') cargarReglas();
}

document.getElementById('inputCod').addEventListener('blur',function(){
  if(this.value.length>0) this.value=this.value.padStart(8,'0');
});
document.getElementById('modalBg').addEventListener('click',function(e){
  if(e.target===this) cerrarModal();
});

// Cargar reglas al inicio
cargarReglas();
</script>
